name: test

# Mirrors the canonical Python+uv test workflow used
# across the cobdfamily fleet: lint job runs ruff,
# pytest job runs the suite with coverage. Both pin
# python 3.12 to match pyproject's requires-python.
#
# townsfolk's tests use testcontainers for PostGIS,
# which needs docker available on the runner --
# ubuntu-latest has it; no extra setup required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt JS actions into Node.js 24 ahead of GitHub forcing it on
# 2026-06-16 (Node 20 actions are deprecated). Runs the action JS
# under Node 24 now so any incompatibility surfaces early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src tests

  pytest:
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: run pytest
        # No --cov flags; townsfolk doesn't have
        # pytest-cov in dev deps yet. When coverage gates
        # land across the fleet (IT-stack maturity 3-12
        # month item), add pytest-cov to pyproject + flip
        # this back to the coverage variant the rest of
        # the fleet uses.
        run: uv run pytest -q
