name: test

# Mirrors the canonical Python+uv test workflow used
# across the cobdfamily fleet: lint job runs ruff,
# pytest job runs the suite with coverage. Both pin
# python 3.12 to match pyproject's requires-python.
#
# townsfolk's tests use testcontainers for PostGIS,
# which needs docker available on the runner --
# ubuntu-latest has it; no extra setup required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src tests

  pytest:
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: run pytest with coverage
        run: uv run pytest -q --cov --cov-report=term --cov-report=xml
      - name: upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
